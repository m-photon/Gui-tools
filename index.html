<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imgui tools</title>
  <style>
    body {
      background: #000;
      color: #fff;
      margin: 0;
      font-family: "Comic Sans MS", "Comic Sans", cursive;
      display: flex;
      flex-flow: column nowrap;
      height: 100vh;
      overflow: hidden; 
      position: relative;
    }

    #lock-screen {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      z-index: 100000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .lock-box {
      background: #111;
      border: 2px solid #333;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
      box-sizing: border-box;
    }
    .lock-title { color: #a855f7; margin-top: 0; }
    .status-msg { margin: 20px 0; color: #aaa; font-size: 14px; }

    .admin-input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      background: #222;
      border: 1px solid #444;
      color: #fff;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .admin-btn {
      background: #a855f7;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    .admin-btn:hover { background: #9333ea; }
    .switch-lnk {
      color: #3b82f6;
      font-size: 12px;
      cursor: pointer;
      display: inline-block;
      margin-top: 15px;
      text-decoration: underline;
    }

    #particles-js {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .hero-shape {
      position: absolute;
      width: 750px;
      height: 750px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1; 
      pointer-events: none; 
      background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, rgba(0,0,0,0) 70%);
      animation: spin 15s linear infinite;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .top-nav {
      background: #1a1a1a; 
      width: 100%;
      min-height: 60px;
      border-bottom: 2px solid #333;
      position: relative;
      z-index: 3;
    }

    .main-wrap {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
      position: relative;
      z-index: 2;
    }

    .menu-box {
      background: rgba(17, 17, 17, 0.75);
      border: 1px solid #222;
      border-radius: 8px;
      width: 100%;
      max-width: 500px;
      padding: 50px 40px;
      display: flex;
      flex-flow: column nowrap;
      align-items: center;
      gap: 15px;
      box-sizing: border-box;
      backdrop-filter: blur(6px); 
    }

    .brand-logo {
      max-width: 180px;
      height: auto;
      margin-bottom: 20px;
      border-radius: 12px; 
    }

    .btn {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      padding: 15px 40px;
      font-family: inherit;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 250px;
      border-radius: 4px;
      transition: 0.2s;
    }

    .btn:hover { background: #444; }

    .modal-wrapper {
      display: none; 
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999; 
      flex-flow: column nowrap;
    }

    .modal-head {
      background: #1a1a1a;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #333;
    }

    .modal-title {
      margin: 0;
      font-size: 18px;
      font-family: 'Segoe UI', sans-serif;
      color: #a855f7;
    }

    .head-actions { display: flex; gap: 10px; }

    .btn-fs {
      background: #3b82f6; 
      color: #fff;
      border: none;
      padding: 8px 20px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-fs:hover { background: #2563eb; }

    .btn-close {
      background: #ef4444; 
      color: #fff;
      border: none;
      padding: 8px 20px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-close:hover { background: #dc2626; }

    #app-frame {
      flex-grow: 1;
      border: none;
      background: transparent;
    }

    .adm-section {
      width: 100%;
      text-align: left;
      border-top: 1px solid #333;
      margin-top: 15px;
      padding-top: 15px;
    }
    .adm-lbl {
      font-size: 12px;
      color: #a855f7;
      font-weight: bold;
      margin-bottom: 5px;
      display: block;
    }
    .result-box {
      background: #222;
      border: 1px dashed #a855f7;
      padding: 10px;
      margin-top: 10px;
      font-size: 11px;
      word-break: break-all;
      user-select: all;
    }
  </style>
</head>
<body>

  <div id="lock-screen">
    <div class="lock-box" id="mode-user">
      <h2 class="lock-title">Access Restricted</h2>
      <div id="status-message" class="status-msg">Verifying 1-time authorization token...</div>
      <div class="switch-lnk" onclick="switchMode('admin')">Access Admin Portal</div>
    </div>

    <div class="lock-box" id="mode-admin" style="display:none;">
      <h2 class="lock-title">Admin Portal</h2>
      <input type="email" id="adm-email" class="admin-input" placeholder="Your Admin Email">
      <input type="password" id="adm-pass" class="admin-input" placeholder="Master Password">
      <button class="admin-btn" onclick="loginAdmin()">Login to Dashboard</button>
      <div id="admin-login-error" style="color:#ef4444; font-size:13px; margin-top:10px;"></div>
      <div class="switch-lnk" onclick="switchMode('user')">Back to Validation Screen</div>
    </div>
  </div>

  <div id="particles-js"></div>
  <div class="hero-shape"></div>

  <div class="top-nav"></div>

  <div class="main-wrap">
    <div class="menu-box" id="normal-menu">
      <img src="https://media.discordapp.net/attachments/1463304807149473946/1507810543010975754/image.png?ex=6a1492ff&is=6a13417f&hm=f4a9b4310ce48c88fe8b0a727ee691107e857ddd02e743ded396e53e448b5e8c&=&format=webp&quality=lossless&width=362&height=242" alt="GUI Logo" class="brand-logo">
      <button class="btn" onclick="launchApp('html')">Open HTML Editor</button>
      <button class="btn" onclick="launchApp('apk')">Open APK Editor</button>
    </div>

    <div class="menu-box" id="admin-menu" style="display:none;">
      <h2 class="lock-title">Admin Control Panel</h2>
      
      <div class="adm-section">
        <label class="adm-lbl">Generate Single-Use Link</label>
        <input type="email" id="target-user-email" class="admin-input" placeholder="User's Email Address">
        <button class="admin-btn" style="background:#3b82f6;" onclick="generateUserLink()">Generate Access Link</button>
        <div id="link-result" class="result-box" style="display:none;"></div>
      </div>

      <div class="adm-section">
        <label class="adm-lbl">Authorize New Admin Email</label>
        <input type="email" id="new-admin-email" class="admin-input" placeholder="New Admin Email Address">
        <button class="admin-btn" style="background:#22c55e;" onclick="addNewAdmin()">Authorize Admin</button>
        <div id="admin-result" style="font-size:13px; margin-top:5px; text-align:center;"></div>
      </div>
    </div>
  </div>

  <div class="modal-wrapper" id="sys-modal">
    <div class="modal-head">
      <h2 class="modal-title" id="m-title">Editor</h2>
      <div class="head-actions">
        <button class="btn-fs" onclick="toggleFS()">Fullscreen</button>
        <button class="btn-close" onclick="closeApp()">Close App</button>
      </div>
    </div>
    <iframe id="app-frame"></iframe>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    let cachedAdminEmail = "";
    let cachedAdminSecret = "";

    window.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      const statusText = $('status-message');

      if (!code) {
        statusText.innerHTML = "<span style='color:#ef4444;'>Error: No access code detected.<br>You must use an official single-use generation link.</span>";
        return;
      }

      try {
        const response = await fetch('http://localhost:3000/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          statusText.innerHTML = `<span style='color:#22c55e;'>Access Granted!<br>Welcome, ${data.email}</span>`;
          window.history.replaceState({}, document.title, window.location.pathname);
          setTimeout(() => { $('lock-screen').remove(); }, 1200);
        } else {
          statusText.innerHTML = `<span style='color:#ef4444;'>Access Denied:<br>${data.error || 'Invalid Link Code'}</span>`;
        }
      } catch (err) {
        statusText.innerHTML = "<span style='color:#ef4444;'>Error connecting to validation servers. Please try again later.</span>";
      }
    });

    function switchMode(mode) {
      if (mode === 'admin') {
        $('mode-user').style.display = 'none';
        $('mode-admin').style.display = 'block';
      } else {
        $('mode-admin').style.display = 'none';
        $('mode-user').style.display = 'block';
      }
    }

    async function loginAdmin() {
      const email = $('adm-email').value;
      const secret = $('adm-pass').value;
      const errorDiv = $('admin-login-error');

      errorDiv.innerText = "";

      try {
        const response = await fetch('http://localhost:3000/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, secret })
        });
        const data = await response.json();

        if (response.ok && data.success) {
          cachedAdminEmail = email;
          cachedAdminSecret = secret;
          $('normal-menu').style.display = 'none';
          $('admin-menu').style.display = 'flex';
          $('lock-screen').remove();
        } else {
          errorDiv.innerText = data.error || "Login failed.";
        }
      } catch (err) {
        errorDiv.innerText = "Error connecting to server.";
      }
    }

    async function generateUserLink() {
      const targetEmail = $('target-user-email').value;
      const resBox = $('link-result');
      resBox.style.display = "none";

      try {
        const response = await fetch('http://localhost:3000/admin/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            adminEmail: cachedAdminEmail,
            secret: cachedAdminSecret,
            targetEmail: targetEmail
          })
        });
        const data = await response.json();

        if (response.ok && data.success) {
          const generatedLink = `${window.location.origin}${window.location.pathname}?code=${data.code}`;
          resBox.innerText = generatedLink;
          resBox.style.display = "block";
        } else {
          alert(data.error || "Failed to generate link.");
        }
      } catch (err) {
        alert("Server communication error.");
      }
    }

    async function addNewAdmin() {
      const newAdminEmail = $('new-admin-email').value;
      const resDiv = $('admin-result');
      resDiv.innerText = "";

      try {
        const response = await fetch('http://localhost:3000/admin/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            adminEmail: cachedAdminEmail,
            secret: cachedAdminSecret,
            newAdminEmail: newAdminEmail
          })
        });
        const data = await response.json();

        if (response.ok && data.success) {
          resDiv.innerHTML = "<span style='color:#22c55e;'>Admin authorized successfully!</span>";
          $('new-admin-email').value = "";
        } else {
          resDiv.innerHTML = `<span style='color:#ef4444;'>${data.error || 'Failed to add admin.'}</span>`;
        }
      } catch (err) {
        resDiv.innerHTML = "<span style='color:#ef4444;'>Server communication error.</span>";
      }
    }

    const tplHTML = `<!DOCTYPE html><html><body style="background:#111;color:#fff;font-family:sans-serif;padding:20px;"><h2>HTML Editor Placeholder</h2></body></html>`;
    const tplAPK = `<!DOCTYPE html><html><body style="background:#111;color:#fff;font-family:sans-serif;padding:20px;"><h2>APK Editor Placeholder</h2></body></html>`;

    function launchApp(type) {
      const modal = $('sys-modal');
      const title = $('m-title');
      const frame = $('app-frame');

      if (type === 'html') {
        title.innerText = "HTML Editor";
        frame.srcdoc = tplHTML;
      } else if (type === 'apk') {
        title.innerText = "APK Opener";
        frame.srcdoc = tplAPK;
      }
      modal.style.display = 'flex';
    }

    function toggleFS() {
      const frame = $('app-frame');
      if (!document.fullscreenElement) {
        frame.requestFullscreen().catch(err => console.log(err));
      } else {
        document.exitFullscreen();
      }
    }

    function closeApp() {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
      $('sys-modal').style.display = 'none';
      $('app-frame').srcdoc = '';
    }
  </script>
</body>
</html>
