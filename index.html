<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imgui tools</title>
  <style>
    body {
      background: #000;
      color: #fff;
      margin: 0;
      font-family: "Comic Sans MS", "Comic Sans", cursive;
      display: flex;
      flex-flow: column nowrap;
      height: 100vh;
      overflow: hidden; 
      position: relative;
    }

    #lock-screen {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      z-index: 100000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .lock-box {
      background: #111;
      border: 2px solid #333;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
      box-sizing: border-box;
    }
    .lock-title { color: #a855f7; margin-top: 0; }

    .admin-input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      background: #222;
      border: 1px solid #444;
      color: #fff;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .admin-btn {
      background: #a855f7;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    .admin-btn:hover { background: #9333ea; }
    .switch-lnk {
      color: #3b82f6;
      font-size: 12px;
      cursor: pointer;
      display: inline-block;
      margin-top: 15px;
      text-decoration: underline;
    }

    #particles-js {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .hero-shape {
      position: absolute;
      width: 750px;
      height: 750px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1; 
      pointer-events: none; 
      background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, rgba(0,0,0,0) 70%);
      animation: spin 15s linear infinite;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .top-nav {
      background: #1a1a1a; 
      width: 100%;
      min-height: 60px;
      border-bottom: 2px solid #333;
      position: relative;
      z-index: 3;
    }

    .main-wrap {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
      position: relative;
      z-index: 2;
    }

    .menu-box {
      background: rgba(17, 17, 17, 0.75);
      border: 1px solid #222;
      border-radius: 8px;
      width: 100%;
      max-width: 500px;
      padding: 50px 40px;
      display: flex;
      flex-flow: column nowrap;
      align-items: center;
      gap: 15px;
      box-sizing: border-box;
      backdrop-filter: blur(6px); 
    }

    .brand-logo {
      max-width: 180px;
      height: auto;
      margin-bottom: 20px;
      border-radius: 12px; 
    }

    .btn {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      padding: 15px 40px;
      font-family: inherit;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 250px;
      border-radius: 4px;
      transition: 0.2s;
    }

    .btn:hover { background: #444; }

    .modal-wrapper {
      display: none; 
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999; 
      flex-flow: column nowrap;
    }

    .modal-head {
      background: #1a1a1a;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #333;
    }

    .modal-title {
      margin: 0;
      font-size: 18px;
      font-family: 'Segoe UI', sans-serif;
      color: #a855f7;
    }

    .head-actions { display: flex; gap: 10px; }

    .btn-fs {
      background: #3b82f6; 
      color: #fff;
      border: none;
      padding: 8px 20px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-fs:hover { background: #2563eb; }

    .btn-close {
      background: #ef4444; 
      color: #fff;
      border: none;
      padding: 8px 20px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-close:hover { background: #dc2626; }

    #app-frame {
      flex-grow: 1;
      border: none;
      background: transparent;
    }

    #admin-menu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 5, 20, 0.9);
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .admin-panel-box {
      background: #111;
      border: 2px solid #a855f7;
      padding: 30px;
      border-radius: 16px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.3);
      max-height: 90vh;
      overflow-y: auto;
    }
    .adm-section {
      border-top: 1px solid #222;
      margin-top: 15px;
      padding-top: 15px;
    }
    .adm-lbl {
      font-size: 12px;
      color: #a855f7;
      font-weight: bold;
      margin-bottom: 6px;
      display: block;
      text-transform: uppercase;
    }
    .result-box {
      background: #1a1a1a;
      border: 1px dashed #a855f7;
      padding: 10px;
      margin-top: 10px;
      font-size: 12px;
      word-break: break-all;
      user-select: all;
      color: #22c55e;
    }
    .log-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 11px;
    }
    .log-table th, .log-table td {
      border: 1px solid #333;
      padding: 6px;
      text-align: left;
    }
    .log-table th { background: #1a1a1a; color: #a855f7; }
    .sm-ban-btn {
      background: #ef4444;
      color: #fff;
      border: none;
      padding: 3px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
      font-weight: bold;
    }
    .sm-ban-btn:hover { background: #b91c1c; }
  </style>
</head>
<body>

  <div id="lock-screen" style="display: none;">
    <div class="lock-box" id="mode-admin">
      <h2 class="lock-title">Admin Portal</h2>
      <input type="email" id="adm-email" class="admin-input" placeholder="Your Admin Email">
      <input type="password" id="adm-pass" class="admin-input" placeholder="Your Private Password">
      <button class="admin-btn" onclick="loginAdmin()">Login to Dashboard</button>
      <div id="admin-login-error" style="color:#ef4444; font-size:13px; margin-top:10px;"></div>
      <div class="switch-lnk" onclick="closeAdminLogin()">Cancel</div>
    </div>
  </div>

  <div id="admin-menu-overlay" style="display: none;">
    <div class="admin-panel-box">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 class="lock-title" style="margin:0;">Control Panel</h2>
        <button class="admin-btn" style="width:auto; margin:0; padding: 5px 15px; background:#ef4444;" onclick="logoutAdmin()">Exit Portal</button>
      </div>

      <div class="adm-section">
        <label class="adm-lbl">Live Game Site Visitors (Click to Ban)</label>
        <button class="admin-btn" style="background:#4b5563; margin-top:0; padding:4px 10px; width:auto; font-size:11px;" onclick="refreshVisitorLog()">Refresh Log</button>
        <table class="log-table">
          <thead>
            <tr>
              <th>Device ID / Email</th>
              <th>IP Address</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="visitor-log-rows">
            <tr><td colspan="3" style="text-align:center; color:#888;">No recent visitors found.</td></tr>
          </tbody>
        </table>
      </div>
      
      <div class="adm-section">
        <label class="adm-lbl">Manual Ban Control (Email, IP, or Device ID)</label>
        <input type="text" id="ban-user-email" class="admin-input" placeholder="Enter target to ban...">
        <button class="admin-btn" style="background:#ef4444;" onclick="executeBan(true)">Issue Manual Ban</button>
      </div>

      <div class="adm-section">
        <label class="adm-lbl">Unban Control</label>
        <input type="text" id="unban-user-email" class="admin-input" placeholder="Enter target to unban...">
        <button class="admin-btn" style="background:#22c55e;" onclick="executeBan(false)">Lift Manual Ban</button>
      </div>

      <div class="adm-section">
        <label class="adm-lbl">Identity Token Link Generator (Optional Tagging)</label>
        <input type="email" id="target-user-email" class="admin-input" placeholder="User's Email Address">
        <button class="admin-btn" style="background:#3b82f6;" onclick="generateUserLink()">Generate Identity Link</button>
        <div id="link-result" class="result-box" style="display:none;"></div>
      </div>

      <div class="adm-section">
        <label class="adm-lbl">Authorize New Admin Email</label>
        <input type="email" id="new-admin-email" class="admin-input" placeholder="New Admin Email Address">
        <button class="admin-btn" style="background:#eab308; color:#000;" onclick="addNewAdmin()">Authorize Admin</button>
        <div id="admin-result" class="result-box" style="display:none; color:#eab308; border-color:#eab308;"></div>
      </div>
    </div>
  </div>

  <div id="particles-js"></div>
  <div class="hero-shape"></div>

  <div class="top-nav">
    <button class="btn" style="width:auto; position:absolute; right:15px; top:8px; padding:7px 20px;" onclick="openAdminPanelDirectly()">Admin Menu</button>
  </div>

  <div class="main-wrap">
    <div class="menu-box">
      <img src="https://media.discordapp.net/attachments/1463304807149473946/1507810543010975754/image.png?ex=6a1492ff&is=6a13417f&hm=f4a9b4310ce48c88fe8b0a727ee691107e857ddd02e743ded396e53e448b5e8c&=&format=webp&quality=lossless&width=362&height=242" alt="GUI Logo" class="brand-logo">
      <button class="btn" onclick="launchApp('html')">Open HTML Editor</button>
      <button class="btn" onclick="launchApp('apk')">Open APK Editor</button>
    </div>
  </div>

  <div class="modal-wrapper" id="sys-modal">
    <div class="modal-head">
      <h2 class="modal-title" id="m-title">Editor</h2>
      <div class="head-actions">
        <button class="btn-fs" onclick="toggleFS()">Fullscreen</button>
        <button class="btn-close" onclick="closeApp()">Close App</button>
      </div>
    </div>
    <iframe id="app-frame"></iframe>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    let cachedAdminEmail = "";
    let cachedAdminSecret = "";

    async function loginAdmin() {
      const email = $('adm-email').value;
      const secret = $('adm-pass').value;
      const errorDiv = $('admin-login-error');
      errorDiv.innerText = "";

      try {
        const response = await fetch('http://localhost:3000/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, secret })
        });
        const data = await response.json();

        if (response.ok && data.success) {
          cachedAdminEmail = email;
          cachedAdminSecret = secret;
          $('lock-screen').style.display = 'none';
          $('admin-menu-overlay').style.display = 'flex';
          refreshVisitorLog();
        } else {
          errorDiv.innerText = data.error || "Login failed.";
        }
      } catch (err) {
        errorDiv.innerText = "Error connecting to server.";
      }
    }

    function openAdminPanelDirectly() {
      if (cachedAdminEmail && cachedAdminSecret) {
        $('admin-menu-overlay').style.display = 'flex';
        refreshVisitorLog();
      } else {
        $('lock-screen').style.display = 'flex';
      }
    }

    function closeAdminLogin() {
      $('lock-screen').style.display = 'none';
    }

    function logoutAdmin() {
      $('admin-menu-overlay').style.display = 'none';
      cachedAdminEmail = "";
      cachedAdminSecret = "";
    }

    async function refreshVisitorLog() {
      try {
        const response = await fetch('http://localhost:3000/admin/visitors', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminEmail: cachedAdminEmail, secret: cachedAdminSecret })
        });
        const data = await response.json();
        if (response.ok && data.success) {
          const tbody = $('visitor-log-rows');
          tbody.innerHTML = "";
          if (data.visitors.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#888;">No recent visitors found.</td></tr>`;
            return;
          }
          data.visitors.forEach(v => {
            const tr = document.createElement('tr');
            const identityDisplay = v.email !== "Anonymous Guest" ? `${v.email} (${v.deviceId})` : v.deviceId;
            tr.innerHTML = `
              <td>${identityDisplay}</td>
              <td>${v.ip}</td>
              <td>
                <button class="sm-ban-btn" onclick="quickBan('${v.deviceId}')">Ban ID</button>
                <button class="sm-ban-btn" style="margin-left:4px;" onclick="quickBan('${v.ip}')">Ban IP</button>
              </td>
            `;
            tbody.appendChild(tr);
          });
        }
      } catch(e) {}
    }

    async function quickBan(target) {
      try {
        const response = await fetch(`http://localhost:3000/admin/ban`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            adminEmail: cachedAdminEmail,
            secret: cachedAdminSecret,
            banEmail: target
          })
        });
        if (response.ok) {
          alert(`Successfully banned: ${target}`);
          refreshVisitorLog();
        }
      } catch(e){}
    }

    async function generateUserLink() {
      const targetEmail = $('target-user-email').value;
      const resBox = $('link-result');
      resBox.style.display = "none";

      try {
        const response = await fetch('http://localhost:3000/admin/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            adminEmail: cachedAdminEmail,
            secret: cachedAdminSecret,
            targetEmail: targetEmail
          })
        });
        const data = await response.json();

        if (response.ok && data.success) {
          const gameSiteBaseUrl = window.location.href.replace('imgui-tools.html', 'index.html').split('?')[0];
          const generatedLink = `${gameSiteBaseUrl}?code=${data.code}`;
          resBox.innerText = generatedLink;
          resBox.style.display = "block";
        } else {
          alert(data.error || "Failed to generate link.");
        }
      } catch (err) {
        alert("Server communication error.");
      }
    }

    async function executeBan(shouldBan) {
      const targetInput = shouldBan ? $('ban-user-email') : $('unban-user-email');
      const endpoint = shouldBan ? 'ban' : 'unban';
      
      if (!targetInput.value) return alert("Please specify a target value.");

      try {
        const response = await fetch(`http://localhost:3000/admin/${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            adminEmail: cachedAdminEmail,
            secret: cachedAdminSecret,
            [shouldBan ? 'banEmail' : 'unbanEmail']: targetInput.value
          })
        });
        const data = await response.json();
        if (response.ok && data.success) {
          alert(`Operation successful for: ${targetInput.value}`);
          targetInput.value = "";
          refreshVisitorLog();
        } else {
          alert(data.error || "Operation failed.");
        }
      } catch (e) {
        alert("Server communication error.");
      }
    }

    async function addNewAdmin() {
      const newAdminEmail = $('new-admin-email').value;
      const resDiv = $('admin-result');
      resDiv.style.display = "none";
      resDiv.innerText = "";

      try {
        const response = await fetch('http://localhost:3000/admin/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            adminEmail: cachedAdminEmail,
            secret: cachedAdminSecret,
            newAdminEmail: newAdminEmail
          })
        });
        const data = await response.json();

        if (response.ok && data.success) {
          resDiv.innerHTML = `SUCCESS: Admin account created!<br>Email: ${newAdminEmail}<br>Generated Password: <strong style="color:#fff; background:#222; padding:2px 6px; border-radius:4px; user-select:all;">${data.password}</strong>`;
          resDiv.style.display = "block";
          $('new-admin-email').value = "";
        } else {
          alert(data.error || 'Failed to add admin.');
        }
      } catch (err) {
        alert("Server communication error.");
      }
    }

    const tplHTML = `<!DOCTYPE html><html><body style="background:#111;color:#fff;font-family:sans-serif;padding:20px;"><h2>HTML Editor Placeholder</h2></body></html>`;
    const tplAPK = `<!DOCTYPE html><html><body style="background:#111;color:#fff;font-family:sans-serif;padding:20px;"><h2>APK Editor Placeholder</h2></body></html>`;

    function launchApp(type) {
      const modal = $('sys-modal');
      const title = $('m-title');
      const frame = $('app-frame');

      if (type === 'html') {
        title.innerText = "HTML Editor";
        frame.srcdoc = tplHTML;
      } else if (type === 'apk') {
        title.innerText = "APK Opener";
        frame.srcdoc = tplAPK;
      }
      modal.style.display = 'flex';
    }

    function toggleFS() {
      const frame = $('app-frame');
      if (!document.fullscreenElement) {
        frame.requestFullscreen().catch(err => console.log(err));
      } else {
        document.exitFullscreen();
      }
    }

    function closeApp() {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
      $('sys-modal').style.display = 'none';
      $('app-frame').srcdoc = '';
    }
  </script>
</body>
</html>
