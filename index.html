<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imgui tools</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* The main container to center everything */
        .content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* The dark gray box in the middle */
        .frame {
            background-color: #111111; /* Dark gray to match your screenshot */
            border: 1px solid #222222;
            border-radius: 8px;
            width: 100%;
            max-width: 500px; /* Kept compact like the image */
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            box-sizing: border-box;
        }

        /* The logo */
        .logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 20px;
            /* If your image has a white box, this will round the corners slightly so it doesn't look as harsh */
            border-radius: 12px; 
        }

        /* The rectangular buttons */
        .rect-btn {
            background-color: #2a2a2a;
            color: #ffffff;
            border: 1px solid #444444;
            padding: 15px 40px;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 250px;
            border-radius: 4px;
        }

        .rect-btn:hover {
            background-color: #3a3a3a;
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="frame">
            <img src="https://media.discordapp.net/attachments/1463304807149473946/1507810543010975754/image.png" alt="GUI Logo" class="logo">
            
            <button class="rect-btn">Button 1</button>
            <button class="rect-btn">Button 2</button>
            <button class="rect-btn">Button 3</button>
        </div>
    </div>

</body>
</html>
