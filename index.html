<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imgui tools</title>
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Basic Inputs and Buttons */
    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0 15px 0;
      background-color: #222;
      border: 1px solid #444;
      color: #fff;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 10px 15px;
      border: none;
      cursor: pointer;
      color: #fff;
      font-weight: bold;
      font-size: 14px;
      width: 100%;
    }

    .btn-blue { background-color: #007bff; }
    .btn-blue:hover { background-color: #0056b3; }
    .btn-red { background-color: #dc3545; }
    .btn-red:hover { background-color: #c82333; }
    .btn-green { background-color: #28a745; }
    .btn-green:hover { background-color: #218838; }
    .btn-gray { background-color: #555; }
    .btn-gray:hover { background-color: #444; }

    .sm-btn {
      width: auto;
      padding: 5px 10px;
      font-size: 12px;
    }

    /* Overlays and Panels */
    .overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: flex-start;
      padding-top: 50px;
      overflow-y: auto;
    }

    .panel {
      background-color: #1e1e1e;
      border: 1px solid #444;
      padding: 30px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 50px;
    }

    .panel h2 {
      margin-top: 0;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
      font-size: 18px;
    }

    .section-label {
      font-size: 14px;
      font-weight: bold;
      color: #aaa;
      margin-top: 20px;
      margin-bottom: 10px;
      display: block;
    }

    /* Navigation and Layout */
    .top-nav {
      background-color: #1e1e1e;
      border-bottom: 1px solid #333;
      padding: 10px 20px;
      text-align: right;
    }

    .main-wrap {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .brand-logo {
      max-width: 250px;
      margin-bottom: 30px;
    }

    .tool-menu {
      background-color: #1e1e1e;
      border: 1px solid #333;
      padding: 40px;
      width: 300px;
      text-align: center;
    }

    /* Logs and Results */
    .log-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .log-table th, .log-table td {
      border: 1px solid #444;
      padding: 8px;
      text-align: left;
    }
    .log-table th { background-color: #2a2a2a; }

    .result-box {
      background-color: #111;
      border: 1px solid #555;
      padding: 15px;
      font-family: monospace;
      color: #4caf50;
      word-break: break-all;
      margin-top: 10px;
    }

    /* Fullscreen Modal */
    #sys-modal { padding-top: 0; }
    .modal-head {
      background-color: #222;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #444;
      width: 100%;
      box-sizing: border-box;
    }
    #app-frame {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background-color: #fff;
    }
  </style>
</head>
<body>

  <div class="top-nav">
    <button class="btn-gray sm-btn" onclick="openAdminPanelDirectly()">Admin Portal</button>
  </div>

  <div class="main-wrap">
    <img src="https://media.discordapp.net/attachments/1463304807149473946/1507810543010975754/image.png?ex=6a1492ff&is=6a13417f&hm=f4a9b4310ce48c88fe8b0a727ee691107e857ddd02e743ded396e53e448b5e8c&=&format=webp&quality=lossless" alt="GUI Logo" class="brand-logo">
    <div class="tool-menu">
      <button class="btn-blue" style="margin-bottom: 15px;" onclick="launchApp('html')">Open HTML Editor</button>
      <button class="btn-blue" onclick="launchApp('apk')">Open APK Editor</button>
    </div>
  </div>

  <div id="lock-screen" class="overlay">
    <div class="panel" style="max-width: 400px;">
      <h2>Admin Login</h2>
      <input type="email" id="adm-email" placeholder="Email Address">
      <input type="password" id="adm-pass" placeholder="Password">
      <button class="btn-blue" onclick="loginAdmin()">Login</button>
      <div id="admin-login-error" style="color: #dc3545; font-size: 13px; margin-top: 10px; text-align: center;"></div>
      <div style="text-align: center; margin-top: 15px;">
        <span style="color: #888; font-size: 12px; cursor: pointer;" onclick="closeAdminLogin()">Cancel</span>
      </div>
    </div>
  </div>

  <div id="admin-menu-overlay" class="overlay">
    <div class="panel">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0; border: none; padding: 0;">Control Panel</h2>
        <button class="btn-gray sm-btn" onclick="logoutAdmin()">Logout</button>
      </div>

      <span class="section-label">Live Game Site Visitors</span>
      <button class="btn-gray sm-btn" style="margin-bottom: 10px;" onclick="refreshVisitorLog()">Refresh Logs</button>
      <table class="log-table">
        <thead>
          <tr>
            <th>Identity / Email</th>
            <th>IP Address</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="visitor-log-rows">
          <tr><td colspan="3" style="text-align:center; color:#888;">No recent visitors found.</td></tr>
        </tbody>
      </table>
      
      <span class="section-label">Manual Ban Control</span>
      <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
          <input type="text" id="ban-user-email" placeholder="Enter Identity, IP, or Email to Ban">
          <button class="btn-red" onclick="executeBan(true)">Ban Target</button>
        </div>
        <div style="flex: 1;">
          <input type="text" id="unban-user-email" placeholder="Enter Target to Unban">
          <button class="btn-green" onclick="executeBan(false)">Unban Target</button>
        </div>
      </div>

      <span class="section-label">Identity Token Link Generator</span>
      <input type="email" id="target-user-email" placeholder="User's Email Address">
      <button class="btn-blue" onclick="generateUserLink()">Generate Identity Link</button>
      <div id="link-result" class="result-box" style="display:none;"></div>

      <span class="section-label">Authorize New Admin</span>
      <input type="email" id="new-admin-email" placeholder="New Admin Email Address">
      <button class="btn-gray" onclick="addNewAdmin()">Create Admin</button>
      <div id="admin-result" class="result-box" style="display:none;"></div>
    </div>
  </div>

  <div class="overlay" id="sys-modal" style="flex-direction: column; padding: 0;">
    <div class="modal-head">
      <h2 id="m-title" style="margin: 0; font-size: 16px; border: none;">Workspace</h2>
      <div>
        <button class="btn-gray sm-btn" onclick="toggleFS()">Fullscreen</button>
        <button class="btn-red sm-btn" onclick="closeApp()">Close</button>
      </div>
    </div>
    <iframe id="app-frame"></iframe>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    let cachedAdminEmail = "";
    let cachedAdminSecret = "";
    const SERVER_URL = "http://192.168.1.141:3000";

    async function loginAdmin() {
      const email = $('adm-email').value;
      const secret = $('adm-pass').value;
      const errorDiv = $('admin-login-error');
      errorDiv.innerText = "";

      try {
        const response = await fetch(`${SERVER_URL}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, secret })
        });
        const data = await response.json();

        if (response.ok && data.success) {
          cachedAdminEmail = email;
          cachedAdminSecret = secret;
          $('lock-screen').style.display = 'none';
          $('admin-menu-overlay').style.display = 'flex';
          refreshVisitorLog();
        } else {
          errorDiv.innerText = data.error || "Login failed.";
        }
      } catch (err) {
        errorDiv.innerText = "Error connecting to server.";
      }
    }

    function openAdminPanelDirectly() {
      if (cachedAdminEmail && cachedAdminSecret) {
        $('admin-menu-overlay').style.display = 'flex';
        refreshVisitorLog();
      } else {
        $('lock-screen').style.display = 'flex';
      }
    }

    function closeAdminLogin() { $('lock-screen').style.display = 'none'; }
    
    function logoutAdmin() {
      $('admin-menu-overlay').style.display = 'none';
      cachedAdminEmail = "";
      cachedAdminSecret = "";
    }

    async function refreshVisitorLog() {
      try {
        const response = await fetch(`${SERVER_URL}/admin/visitors`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminEmail: cachedAdminEmail, secret: cachedAdminSecret })
        });
        const data = await response.json();
        if (response.ok && data.success) {
          const tbody = $('visitor-log-rows');
          tbody.innerHTML = "";
          if (data.visitors.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#888;">No recent visitors found.</td></tr>`;
            return;
          }
          data.visitors.forEach(v => {
            const tr = document.createElement('tr');
            const identityDisplay = v.email !== "Anonymous Guest" ? `${v.email} (${v.deviceId})` : v.deviceId;
            tr.innerHTML = `
              <td>${identityDisplay}</td>
              <td>${v.ip}</td>
              <td>
                <button class="btn-red sm-btn" onclick="quickBan('${v.deviceId}')">Ban ID</button>
                <button class="btn-red sm-btn" onclick="quickBan('${v.ip}')">Ban IP</button>
              </td>
            `;
            tbody.appendChild(tr);
          });
        }
      } catch(e) {}
    }

    async function quickBan(target) {
      try {
        const response = await fetch(`${SERVER_URL}/admin/ban`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminEmail: cachedAdminEmail, secret: cachedAdminSecret, banEmail: target })
        });
        const data = await response.json();
        if (response.ok && data.success) {
          if (data.linked) {
            alert(`Targeted matching device and IP addresses blacklisted.`);
          } else {
            alert(`MANUAL TARGET APPLIED: ${target} added to database.`);
          }
          refreshVisitorLog();
        }
      } catch(e){}
    }

    async function generateUserLink() {
      const targetEmail = $('target-user-email').value;
      const resBox = $('link-result');
      resBox.style.display = "none";

      try {
        const response = await fetch(`${SERVER_URL}/admin/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminEmail: cachedAdminEmail, secret: cachedAdminSecret, targetEmail: targetEmail })
        });
        const data = await response.json();

        if (response.ok && data.success) {
          const gameSiteBaseUrl = window.location.href.replace('imgui-tools.html', 'index.html').split('?')[0];
          resBox.innerText = `${gameSiteBaseUrl}?code=${data.code}`;
          resBox.style.display = "block";
        } else {
          alert(data.error || "Failed to generate link.");
        }
      } catch (err) {
        alert("Server communication error.");
      }
    }

    async function executeBan(shouldBan) {
      const targetInput = shouldBan ? $('ban-user-email') : $('unban-user-email');
      const endpoint = shouldBan ? 'ban' : 'unban';
      if (!targetInput.value) return alert("Please specify a target value.");

      try {
        const response = await fetch(`${SERVER_URL}/admin/${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminEmail: cachedAdminEmail, secret: cachedAdminSecret, [shouldBan ? 'banEmail' : 'unbanEmail']: targetInput.value })
        });
        const data = await response.json();
        if (response.ok && data.success) {
          if (shouldBan && data.linked) {
             alert(`SUCCESS: Target session identified. Matching Device ID and IP address fully blacklisted.`);
          } else {
             alert(`Operation successful for: ${targetInput.value}`);
          }
          targetInput.value = "";
          refreshVisitorLog();
        } else {
          alert(data.error || "Operation failed.");
        }
      } catch (e) {
        alert("Server communication error.");
      }
    }

    async function addNewAdmin() {
      const newAdminEmail = $('new-admin-email').value;
      const resDiv = $('admin-result');
      resDiv.style.display = "none";
      resDiv.innerText = "";

      try {
        const response = await fetch(`${SERVER_URL}/admin/add`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminEmail: cachedAdminEmail, secret: cachedAdminSecret, newAdminEmail: newAdminEmail })
        });
        const data = await response.json();

        if (response.ok && data.success) {
          resDiv.innerHTML = `Admin account created!<br>Email: ${newAdminEmail}<br>Generated Password: <strong>${data.password}</strong>`;
          resDiv.style.display = "block";
          $('new-admin-email').value = "";
        } else {
          alert(data.error || 'Failed to add admin.');
        }
      } catch (err) {
        alert("Server communication error.");
      }
    }

    const tplHTML = `<!DOCTYPE html><html><body style="background:#fff;color:#000;font-family:sans-serif;padding:20px;"><h2>HTML Editor Environment</h2></body></html>`;
    const tplAPK = `<!DOCTYPE html><html><body style="background:#fff;color:#000;font-family:sans-serif;padding:20px;"><h2>APK Editor Environment</h2></body></html>`;

    function launchApp(type) {
      $('m-title').innerText = type === 'html' ? "HTML Editor" : "APK Opener";
      $('app-frame').srcdoc = type === 'html' ? tplHTML : tplAPK;
      $('sys-modal').style.display = 'flex';
    }

    function toggleFS() {
      if (!document.fullscreenElement) $('app-frame').requestFullscreen().catch(()=>{});
      else document.exitFullscreen();
    }

    function closeApp() {
      if (document.fullscreenElement) document.exitFullscreen();
      $('sys-modal').style.display = 'none';
      $('app-frame').srcdoc = '';
    }
  </script>
</body>
</html>
