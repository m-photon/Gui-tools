<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imgui tools</title>
  <style>
    body {
      background: #000;
      color: #fff;
      margin: 0;
      font-family: "Comic Sans MS", "Comic Sans", cursive;
      display: flex;
      flex-flow: column nowrap;
      height: 100vh;
      overflow: hidden; 
    }

    #particles-js {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .top-nav {
      background: #1a1a1a; 
      width: 100%;
      min-height: 60px;
      border-bottom: 2px solid #333;
      position: relative;
      z-index: 3;
    }

    .main-wrap {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
      position: relative;
      z-index: 1;
    }

    .hero-shape {
      position: absolute;
      width: 750px;
      height: 750px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1; 
      pointer-events: none; 
      animation: spin 15s linear infinite;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .menu-box {
      background: rgba(17, 17, 17, 0.75);
      border: 1px solid #222;
      border-radius: 8px;
      width: 100%;
      max-width: 500px;
      padding: 50px 40px;
      display: flex;
      flex-flow: column nowrap;
      align-items: center;
      gap: 15px;
      box-sizing: border-box;
      backdrop-filter: blur(6px); 
      z-index: 2; 
    }

    .brand-logo {
      max-width: 180px;
      height: auto;
      margin-bottom: 20px;
      border-radius: 12px; 
    }

    .btn {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      padding: 15px 40px;
      font-family: inherit;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 250px;
      border-radius: 4px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #444;
    }

    .modal-wrapper {
      display: none; 
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999; 
      flex-flow: column nowrap;
    }

    .modal-head {
      background: #1a1a1a;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #333;
    }

    .modal-title {
      margin: 0;
      font-size: 18px;
      font-family: 'Segoe UI', sans-serif;
      color: #a855f7;
    }

    .btn-close {
      background: #ef4444; 
      color: #fff;
      border: none;
      padding: 8px 20px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-close:hover { background: #dc2626; }

    #app-frame {
      flex-grow: 1;
      width: 100%;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>
  <div class="top-nav"></div>

  <div class="main-wrap">
    <svg class="hero-shape" viewBox="0 0 100 100">
      <polygon points="50,15 15,85 85,85" fill="none" stroke="#fff" stroke-width="0.1" stroke-linejoin="round" />
      <circle cx="50" cy="15" r="2.5" fill="#a855f7" /> 
      <circle cx="15" cy="85" r="2.5" fill="#22c55e" /> 
      <circle cx="85" cy="85" r="2.5" fill="#3b82f6" /> 
    </svg>

    <div class="menu-box">
      <img src="https://media.discordapp.net/attachments/1463304807149473946/1507810543010975754/image.png?ex=6a13417f&is=6a11efff&hm=06353bd88304c09a2d1f95d2387da0a191387a7f39c3ea2079486ca0f4ce0da8&=&format=webp&quality=lossless&width=362&height=242" alt="GUI Logo" class="brand-logo">

      <button class="btn" onclick="launchApp('apk')">Open APK Editor</button>
      <button class="btn" onclick="launchApp('sound')">Open Soundboard</button>
    </div>
  </div>

  <div class="modal-wrapper" id="sys-modal">
    <div class="modal-head">
      <h2 class="modal-title" id="m-title">Editor</h2>
      <button class="btn-close" onclick="closeApp()">Close App</button>
    </div>
    <iframe id="app-frame"></iframe>
  </div>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    const $ = id => document.getElementById(id);

    particlesJS("particles-js", {
      particles: {
        number: { value: 60, density: { enable: true, value_area: 800 } },
        color: { value: "#fff" },
        shape: { type: "circle" },
        opacity: { value: 0.5 },
        size: { value: 3, random: true },
        line_linked: { enable: true, distance: 150, color: "#fff", opacity: 0.3, width: 1 },
        move: { enable: true, speed: 2, out_mode: "out" }

      interactivity: {
        detect_on: "canvas",
        events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: true, mode: "push" }, resize: true },
        modes: { grab: { distance: 140, line_linked: { opacity: 1 } }, push: { particles_nb: 4 } }
      },
      retina_detect: true
    });

      const doc = v.contentDocument || v.contentWindow.document;
      doc.open(); doc.write(s.value); doc.close();
    };
    s.addEventListener('input', update);
    update();
  <\/script>
</body>
</html>`;

    function launchApp(type) {
      const modal = $('sys-modal');
      const frame = $('app-frame');
      const title = $('m-title');

      if (type === 'html') {
        title.innerText = "Live HTML Editor";
        frame.srcdoc = tplHTML;
      } else if (type === 'apk') {
        title.innerText = "APK Opener";
        frame.srcdoc = tplAPK;
      } else if (type === 'sound') {
        title.innerText = "Master Soundboard";
        frame.srcdoc = tplSound;
      }
      modal.style.display = 'flex';
    }

    function closeApp() {
      $('sys-modal').style.display = 'none';
      $('app-frame').srcdoc = '';
    }
  </script>
