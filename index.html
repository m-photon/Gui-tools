<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools & Admin</title>
  <style>
    :root {
      --bg: #09090b;
      --card: #18181b;
      --border: #27272a;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --danger: #ef4444;
      --success: #22c55e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden; 
    }

    /* Clean Input Fields */
    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      box-sizing: border-box;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--primary); }

    /* Clean Buttons */
    button {
      font-family: inherit;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-main {
      background: var(--text);
      color: var(--bg);
      padding: 12px 24px;
      width: 100%;
    }
    .btn-main:hover { background: #d4d4d8; transform: translateY(-1px); }
    
    .btn-blue { background: var(--primary); color: #fff; padding: 10px 16px; width: 100%; margin-top: 8px; }
    .btn-blue:hover { background: var(--primary-hover); }

    .btn-red { background: var(--danger); color: #fff; padding: 10px 16px; width: 100%; margin-top: 8px; }
    .btn-red:hover { background: #dc2626; }

    .btn-green { background: var(--success); color: #fff; padding: 10px 16px; width: 100%; margin-top: 8px; }
    .btn-green:hover { background: #16a34a; }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
    }
    .btn-outline:hover { background: var(--card); }

    /* Layout & Cards */
    .top-nav {
      padding: 16px 24px;
      display: flex;
      justify-content: flex-end;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      z-index: 10;
    }

    .main-wrap {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .brand-logo { max-width: 160px; border-radius: 12px; margin-bottom: 24px; display: block; margin-left: auto; margin-right: auto; }
    .title { margin: 0 0 8px 0; font-size: 20px; font-weight: 600; }
    .subtitle { color: var(--muted); margin: 0 0 24px 0; font-size: 14px; }
    .section-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; }

    /* Admin Overlays */
    #admin-menu-overlay, #lock-screen {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .admin-card {
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 32px;
    }

    .admin-section {
      border-top: 1px solid var(--border);
      margin-top: 24px;
      padding-top: 24px;
    }

    .log-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
    .log-table th, .log-table td { border-bottom: 1px solid var(--border); padding: 10px; text-align: left; }
    .log-table th { color: var(--muted); font-weight: 500; }
    .sm-btn { padding: 6px 12px; font-size: 11px; border-radius: 6px; }

    .result-box { background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 13px; word-break: break-all; color: var(--success); }

    /* Modal */
    .modal-wrapper { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 9999; flex-flow: column nowrap; }
    .modal-head { background: var(--card); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .head-actions { display: flex; gap: 12px; }
    #app-frame { flex-grow: 1; border: none; background: #fff; }
  </style>
</head>
<body>

  <div id="lock-screen" style="display: none;">
    <div class="card">
      <h2 class="title">Admin Login</h2>
      <p class="subtitle">Enter credentials to access the control panel.</p>
      <input type="email" id="adm-email" placeholder="Email Address">
      <input type="password" id="adm-pass" placeholder="Password">
      <button class="btn-main" style="margin-top:16px;" onclick="loginAdmin()">Sign In</button>
      <div id="admin-login-error" style="color:var(--danger); font-size:13px; margin-top:12px; text-align:center;"></div>
      <div style="text-align:center; margin-top:16px;">
        <span style="color:var(--muted); font-size:13px; cursor:pointer;" onclick="closeAdminLogin()">Cancel</span>
      </div>
    </div>
  </div>

  <div id="admin-menu-overlay" style="display: none;">
    <div class="card admin-card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <h2 class="title" style="margin:0;">Dashboard</h2>
        <button class="btn-outline sm-btn" onclick="logoutAdmin()">Close</button>
      </div>

      <div class="admin-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <span class="section-label" style="margin:0;">Live Visitors</span>
          <button class="btn-outline sm-btn" onclick="refreshVisitorLog()">Refresh</button>
        </div>
        <table class="log-table">
          <thead><tr><th>Identity / Email</th><th>IP Address</th><th>Actions</th></tr></thead>
          <tbody id="visitor-log-rows">
            <tr><td colspan="3" style="text-align:center; color:var(--muted);">No recent visitors.</td></tr>
          </tbody>
        </table>
      </div>
      
      <div class="admin-section">
        <span class="section-label">Manual Access Control</span>
        <div style="display:flex; gap:12px;">
          <div style="flex:1;">
            <input type="text" id="ban-user-email" placeholder="Email, IP, or Device ID">
            <button class="btn-red" onclick="executeBan(true)">Ban Target</button>
          </div>
          <div style="flex:1;">
            <input type="text" id="unban-user-email" placeholder="Email, IP, or Device ID">
            <button class="btn-green" onclick="executeBan(false)">Unban Target</button>
          </div>
        </div>
      </div>

      <div class="admin-section">
        <span class="section-label">Identity Link Generator</span>
        <input type="email" id="target-user-email" placeholder="User Email Address">
        <button class="btn-blue" onclick="generateUserLink()">Create Link</button>
        <div id="link-result" class="result-box" style="display:none;"></div>
      </div>

      <div class="admin-section">
        <span class="section-label">System Admins</span>
        <input type="email" id="new-admin-email" placeholder="New Admin Email">
        <button class="btn-main" onclick="addNewAdmin()">Add Admin</button>
        <div id="admin-result" class="result-box" style="display:none; color:var(--primary);"></div>
      </div>
    </div>
  </div>

  <div class="top-nav">
    <button class="btn-outline" onclick="openAdminPanelDirectly()">Admin Panel</button>
  </div>

  <div class="main-wrap">
    <div class="card">
      <img src="https://media.discordapp.net/attachments/1463304807149473946/1507810543010975754/image.png?ex=6a1492ff&is=6a13417f&hm=f4a9b4310ce48c88fe8b0a727ee691107e857ddd02e743ded396e53e448b5e8c&=&format=webp&quality=lossless&width=362&height=242" alt="Logo" class="brand-logo">
      <div style="display:flex; flex-direction:column; gap:12px;">
        <button class="btn-main" onclick="launchApp('html')">Open HTML Editor</button>
        <button class="btn-main" onclick="launchApp('apk')">Open APK Editor</button>
      </div>
    </div>
  </div>

  <div class="modal-wrapper" id="sys-modal">
    <div class="modal-head">
      <h2 class="title" id="m-title" style="margin:0;">Workspace</h2>
      <div class="head-actions">
        <button class="btn-outline" onclick="toggleFS()">Fullscreen</button>
        <button class="btn-red" style="margin:0; width:auto; padding:8px 16px;" onclick="closeApp()">Close</button>
      </div>
    </div>
    <iframe id="app-frame"></iframe>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    let cachedAdminEmail = "";
    let cachedAdminSecret = "";
    const SERVER_URL = "http://192.168.1.141:3000";

    async function loginAdmin() {
      const email = $('adm-email').value;
      const secret = $('adm-pass').value;
      const errorDiv = $('admin-login-error');
      errorDiv.innerText = "";

      try {
        const response = await fetch(`${SERVER_URL}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, secret })
        });
        const data = await response.json();

        if (response.ok && data.success) {
          cachedAdminEmail = email;
          cachedAdminSecret = secret;
          $('lock-screen').style.display = 'none';
          $('admin-menu-overlay').style.display = 'flex';
          refreshVisitorLog();
        } else {
          errorDiv.innerText = data.error || "Login failed.";
        }
      } catch (err) {
        errorDiv.innerText = "Error connecting to server.";
      }
    }

    function openAdminPanelDirectly() {
      if (cachedAdminEmail && cachedAdminSecret) {
        $('admin-menu-overlay').style.display = 'flex';
        refreshVisitorLog();
      } else {
        $('lock-screen').style.display = 'flex';
      }
    }

    function closeAdminLogin() { $('lock-screen').style.display = 'none'; }
    function logoutAdmin() { $('admin-menu-overlay').style.display = 'none'; cachedAdminEmail = ""; cachedAdminSecret = ""; }

    async function refreshVisitorLog() {
      try {
        const response = await fetch(`${SERVER_URL}/admin/visitors`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminEmail: cachedAdminEmail, secret: cachedAdminSecret })
        });
        const data = await response.json();
        if (response.ok && data.success) {
          const tbody = $('visitor-log-rows');
          tbody.innerHTML = "";
          if (data.visitors.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:var(--muted);">No recent visitors found.</td></tr>`;
            return;
          }
          data.visitors.forEach(v => {
            const tr = document.createElement('tr');
            const identityDisplay = v.email !== "Anonymous Guest" ? `${v.email} (${v.deviceId})` : v.deviceId;
            tr.innerHTML = `
              <td>${identityDisplay}</td>
              <td>${v.ip}</td>
              <td>
                <button class="btn-red sm-btn" style="margin:0;" onclick="quickBan('${v.deviceId}')">Ban ID</button>
                <button class="btn-red sm-btn" style="margin:0 0 0 4px;" onclick="quickBan('${v.ip}')">Ban IP</button>
              </td>
            `;
            tbody.appendChild(tr);
          });
        }
      } catch(e) {}
    }

    async function quickBan(target) {
      try {
        const response = await fetch(`${SERVER_URL}/admin/ban`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminEmail: cachedAdminEmail, secret: cachedAdminSecret, banEmail: target })
        });
        const data = await response.json();
        if (response.ok && data.success) {
          refreshVisitorLog();
        }
      } catch(e){}
    }

    async function generateUserLink() {
      const targetEmail = $('target-user-email').value;
      const resBox = $('link-result');
      resBox.style.display = "none";
      try {
        const response = await fetch(`${SERVER_URL}/admin/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminEmail: cachedAdminEmail, secret: cachedAdminSecret, targetEmail: targetEmail })
        });
        const data = await response.json();
        if (response.ok && data.success) {
          const gameSiteBaseUrl = window.location.href.replace('imgui-tools.html', 'index.html').split('?')[0];
          resBox.innerText = `${gameSiteBaseUrl}?code=${data.code}`;
          resBox.style.display = "block";
        }
      } catch (err) {}
    }

    async function executeBan(shouldBan) {
      const targetInput = shouldBan ? $('ban-user-email') : $('unban-user-email');
      const endpoint = shouldBan ? 'ban' : 'unban';
      if (!targetInput.value) return;
      try {
        const response = await fetch(`${SERVER_URL}/admin/${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminEmail: cachedAdminEmail, secret: cachedAdminSecret, [shouldBan ? 'banEmail' : 'unbanEmail']: targetInput.value })
        });
        if (response.ok) {
          targetInput.value = "";
          refreshVisitorLog();
        }
      } catch (e) {}
    }

    async function addNewAdmin() {
      const newAdminEmail = $('new-admin-email').value;
      const resDiv = $('admin-result');
      resDiv.style.display = "none";
      try {
        const response = await fetch(`${SERVER_URL}/admin/add`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminEmail: cachedAdminEmail, secret: cachedAdminSecret, newAdminEmail: newAdminEmail })
        });
        const data = await response.json();
        if (response.ok && data.success) {
          resDiv.innerHTML = `Created!<br>Email: ${newAdminEmail}<br>Password: <strong>${data.password}</strong>`;
          resDiv.style.display = "block";
          $('new-admin-email').value = "";
        }
      } catch (err) {}
    }

    function launchApp(type) {
      $('m-title').innerText = type === 'html' ? "HTML Editor" : "APK Opener";
      $('app-frame').srcdoc = `<!DOCTYPE html><html><body style="background:#111;color:#fff;font-family:sans-serif;padding:20px;"><h2>${type.toUpperCase()} Editor Loading...</h2></body></html>`;
      $('sys-modal').style.display = 'flex';
    }

    function toggleFS() {
      if (!document.fullscreenElement) $('app-frame').requestFullscreen().catch(()=>{});
      else document.exitFullscreen();
    }

    function closeApp() {
      if (document.fullscreenElement) document.exitFullscreen();
      $('sys-modal').style.display = 'none';
      $('app-frame').srcdoc = '';
    }
  </script>
</body>
</html>
