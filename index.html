<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imgui tools</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; 
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .widget-bar {
            background-color: #1a1a1a; 
            width: 100%;
            min-height: 60px;
            border-bottom: 2px solid #333333;
            position: relative;
            z-index: 3;
        }

        .content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        .bg-triangle {
            position: absolute;
            width: 750px;
            height: 750px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1; 
            pointer-events: none; 
            animation: spin 15s linear infinite;
        }

        @keyframes spin {
          0% { transform: translate(-50%, -50%) rotate(0deg); }
          100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .frame {
            background-color: rgba(17, 17, 17, 0.75);
            border: 1px solid #222222;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            box-sizing: border-box;
            backdrop-filter: blur(6px); 
            z-index: 2; 
        }
