<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imgui tools</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; 
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .widget-bar {
            background-color: #1a1a1a; 
            width: 100%;
            min-height: 60px;
            border-bottom: 2px solid #333333;
            position: relative;
            z-index: 3;
        }

        .content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        .bg-triangle {
            position: absolute;
            width: 750px;
            height: 750px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1; 
            pointer-events: none; 
            animation: spin 15s linear infinite;
        }

        @keyframes spin {
          0% { transform: translate(-50%, -50%) rotate(0deg); }
          100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .frame {
            background-color: rgba(17, 17, 17, 0.75);
            border: 1px solid #222222;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            box-sizing: border-box;
            backdrop-filter: blur(6px); 
            z-index: 2; 
        }

        .logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 12px; 
        }

        .rect-btn {
            background-color: #2a2a2a;
            color: #ffffff;
            border: 1px solid #444444;
            padding: 15px 40px;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 250px;
            border-radius: 4px;
            transition: 0.2s;
        }

        .rect-btn:hover {
            background-color: #444444;
        }

        .editor-modal {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 9999; 
            flex-direction: column;
        }

        .modal-header {
            background-color: #1a1a1a;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            border-bottom: 2px solid #333;
        }

        .close-btn {
            background-color: #ef4444; 
            color: white;
            border: none;
            padding: 8px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        .close-btn:hover {
            background-color: #dc2626;
        }

        #editor-iframe {
            flex-grow: 1;
            width: 100%;
            border: none;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="widget-bar"></div>

    <div class="content">
        
        <svg class="bg-triangle" viewBox="0 0 100 100">
            <polygon points="50,15 15,85 85,85" fill="none" stroke="#ffffff" stroke-width="0.1" stroke-linejoin="round" />
            <circle cx="50" cy="15" r="2.5" fill="#a855f7" /> 
            <circle cx="15" cy="85" r="2.5" fill="#22c55e" /> 
            <circle cx="85" cy="85" r="2.5" fill="#3b82f6" /> 
        </svg>

        <div class="frame">
            <img src="https://media.discordapp.net/attachments/1463304807149473946/1507810543010975754/image.png?ex=6a13417f&is=6a11efff&hm=06353bd88304c09a2d1f95d2387da0a191387a7f39c3ea2079486ca0f4ce0da8&=&format=webp&quality=lossless&width=362&height=242" alt="GUI Logo" class="logo">
            
            <button class="rect-btn" onclick="openEditor()">Open HTML Editor</button>
            <button class="rect-btn">Button 2</button>
            <button class="rect-btn">Button 3</button>
        </div>
    </div>

    <div class="editor-modal" id="editor-modal">
        <div class="modal-header">
            <button class="close-btn" onclick="closeEditor()">Close Editor</button>
        </div>
        <iframe id="editor-iframe"></iframe>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#ffffff",
                    "opacity": 0.3,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 2,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 140, "line_linked": { "opacity": 1 } },
                    "push": { "particles_nb": 4 }
                }
            },
            "retina_detect": true
        });

        const editorCode = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live HTML Editor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background-color: #1a1a1a;
            padding: 15px 20px;
            border-bottom: 2px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
            color: #a855f7; 
        }

        .container {
            display: flex;
            flex-grow: 1;
            height: calc(100vh - 52px);
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #333;
        }

        .pane:last-child {
            border-right: none;
        }

        .pane-label {
            background-color: #222;
            padding: 8px 15px;
            font-size: 14px;
            color: #888;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
        }

        textarea {
            flex-grow: 1;
            background-color: #111111;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            padding: 15px;
            border: none;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        iframe {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Live HTML Editor</h1>
    </div>

    <div class="container">
        <div class="pane">
            <div class="pane-label">Code (HTML/CSS/JS)</div>
            <textarea id="editor" spellcheck="false">&lt;!DOCTYPE html&gt;
&lt;html&gt;
&lt;head&gt;
    &lt;style&gt;
        body {
            background-color: #222;
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        h1 { color: #22c55e; }
    &lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
    
    &lt;h1&gt;Hello World!&lt;/h1&gt;
    &lt;p&gt;Start typing on the left to see changes instantly.&lt;/p&gt;

&lt;/body&gt;
&lt;/html&gt;</textarea>
        </div>

        <div class="pane">
            <div class="pane-label">Live Preview</div>
            <iframe id="preview"></iframe>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');

        function updatePreview() {
            const code = editor.value;
            const previewDoc = preview.contentDocument || preview.contentWindow.document;
            
            previewDoc.open();
            previewDoc.write(code);
            previewDoc.close();
        }

        editor.addEventListener('input', updatePreview);

        updatePreview();
    <\/script>
</body>
</html>`;

        function openEditor() {
            document.getElementById('editor-modal').style.display = 'flex';
            document.getElementById('editor-iframe').srcdoc = editorCode;
        }

        function closeEditor() {
            document.getElementById('editor-modal').style.display = 'none';
            document.getElementById('editor-iframe').srcdoc = '';
        }
    </script>
</body>
</html>
